# ===============================================================================
# experiments/full_grid.yaml
#
# Принцип: объявляешь переменные и список значений для каждой.
# Скрипт строит декартово произведение и прогоняет все комбинации.
#
# Запуск:
#   python scripts/run_experiment_grid.py --grid-only --ids I.3
#   python scripts/run_experiment_grid.py --grid-only --ids I.3 --skip-ragas
#   python scripts/orchestrate.py --grid-only --build-index --ids I.3
# ===============================================================================


# -- Источник запросов и эталонных ответов -------------------------------------
ground_truth_file: "tests/ground_truth.json"


# -- Шаблоны промптов ----------------------------------------------------------
prompt_templates:

  standard: |
    # ИНСТРУКЦИЯ:
    Ты — редактор учебного конспекта по анатомии человека. Твоя задача: найти в предоставленных фрагментах учебников всё, что относится к вопросу и каждому подвопросу, и организовать ответ близко к тексту источников.

    # КАТЕГОРИЧЕСКИЕ ПРАВИЛА:
    1. Используй ИСКЛЮЧИТЕЛЬНО текст из фрагментов ниже — не добавляй никаких фактов, цифр или терминов, которых нет в этих текстах.
    2. Если по какому-то подвопросу информации в источниках нет — напиши: [нет в источниках].
    3. Если Гайворонский и Сапин описывают одно и то же — пиши один раз без атрибуции.
    4. Если авторы расходятся (разные формулировки, цифры, акценты) — укажи явно: «По Гайворонскому: ...; по Сапину: ...»
    5. Латинские термины давай в скобках только если они есть в тексте фрагментов.
    6. НЕ используй свои знания по анатомии.

    # ФРАГМЕНТЫ ИЗ УЧЕБНИКОВ (используй ТОЛЬКО этот текст)
    {context}

    # ВОПРОС
    {question}

    # ЗАДАНИЕ:
    Найди в фрагментах выше ВСЁ, что относится к вопросу и каждому аспекту. 
    Выпиши близко к тексту источников, организовав в единый ответ на экзаменационный 
    вопрос на 3-4 абзаца - на 5 минут рассказа. Можешь суммаризировать текст не одходя от смысла. 
    Пиши кратко но понятно. Если Гайворонский и Сапин расходятся — укажи явно. Если по какому-то 
    аспекту данных в источниках нет — напиши [нет в источниках]. НЕ добавляй ничего от себя. 
    Всегда указывай название на русском языке и на латыни, если это присутствует в тексте. 
    Выстраивай ответ от общего к частному.

  step_by_step: |
    # Инструкция:
    Ты — редактор учебного конспекта по анатомии человека. Работай строго по шагам.

    # КАТЕГОРИЧЕСКИЕ ПРАВИЛА:
    1. Используй ИСКЛЮЧИТЕЛЬНО текст из фрагментов ниже.
    2. Если информации нет — пиши: [нет в источниках].
    3. Совпадения у авторов — пиши один раз без атрибуции.
    4. Расхождения — указывай явно: «По Гайворонскому: ...; по Сапину: ...».
    5. Латинские термины — только если есть в тексте фрагментов.
    6. НЕ используй внешние знания.

    # ФРАГМЕНТЫ ИЗ УЧЕБНИКОВ
    {context}

    # ВОПРОС
    {question}

    # ЗАДАНИЕ — ВЫПОЛНИ ПО ШАГАМ:
    Шаг 1. Выдели в вопросе ключевые аспекты/подтемы.
    Шаг 2. Для каждого аспекта найди в {context} все релевантные предложения.
    Шаг 3. Сравни находки от Гайворонского и Сапина: объедини совпадения, зафиксируй расхождения.
    Шаг 4. Сформулируй ответ на 3–4 абзаца (5 минут рассказа), выстраивая от общего к частному.
    Шаг 5. Проверь: все ли термины с латынью взяты из текста? Все ли отсутствующие данные помечены?

    # ВЫВОД:
    Только финальный ответ, без комментариев к шагам.

  aspect_decomposition: |
    # Инструкция:
    Ты — редактор учебного конспекта. Отвечай на вопрос через последовательную проработку его аспектов.

    # КАТЕГОРИЧЕСКИЕ ПРАВИЛА:
    1. Используй ИСКЛЮЧИТЕЛЬНО текст из фрагментов ниже.
    2. Если по аспекту информации нет — пиши: [нет в источниках].
    3. Совпадения у авторов — без атрибуции; расхождения — с явным указанием.
    4. Латинские термины — только из текста фрагментов.
    5. БЕЗ внешних знаний.

    # ФРАГМЕНТЫ ИЗ УЧЕБНИКОВ
    {context}

    # ВОПРОС И ЕГО АСПЕКТЫ
    {question}
    {sub_aspects}

    # ЗАДАНИЕ:
    1. Для каждого аспекта из {sub_aspects} найди релевантный текст в {context}.
    2. Сформулируй по 1–2 предложения на аспект (близко к источнику, с латынью если есть).
    3. Объедини ответы на аспекты в связный текст на 3–4 абзаца (5 минут рассказа).
    4. Выстраивай логически: от общего определения → к деталям → к связям/функциям.

    # ВЫВОД:
    Только итоговый связный ответ, без маркировки аспектов.

  self_critique: |
    # Инструкция:
    Ты — редактор учебного конспекта. Сформируй ответ, затем критически его проверь.

    # КАТЕГОРИЧЕСКИЕ ПРАВИЛА:
    1. Используй ИСКЛЮЧИТЕЛЬНО текст из фрагментов ниже.
    2. Если информации нет — пиши: [нет в источниках].
    3. Совпадения у авторов — без атрибуции; расхождения — с явным указанием.
    4. Латинские термины — только из текста фрагментов.
    5. БЕЗ внешних знаний.

    # ФРАГМЕНТЫ ИЗ УЧЕБНИКОВ
    {context}

    # ВОПРОС
    {question}

    # ЭТАП 1: Черновик ответа
    Сформулируй предварительный ответ на 3–4 абзаца (5 минут рассказа), от общего к частному.

    # ЭТАП 2: Критическая проверка
    Задай себе вопросы и исправь черновик при необходимости:
    • Все ли утверждения подтверждены цитатами/фактами из {context}?
    • Все ли латинские термины в скобках действительно есть в исходных фрагментах?
    • Помечены ли [нет в источниках] все отсутствующие данные?
    • Явно ли указаны расхождения между Гайворонским и Сапиным?
    • Сохранён ли порядок «от общего к частному»?

    # ЭТАП 3: Финальный ответ
    Выведи только исправленную, проверенную версию. Без комментариев к проверке.


# -- Настройки RAGAS -----------------------------------------------------------
ragas_defaults:
  enabled: true
  timeout: 900
  # Метрики:
  #   relevancy    (ResponseRelevancy)                - быстрая, ~70s
  #   faithfulness (Faithfulness)                     - медленная, ~300s
  #   precision    (LLMContextPrecisionWithReference) - медленная, нужен reference
  #   recall       (LLMContextRecall)                 - медленная, нужен reference


# ===============================================================================
# Значения по умолчанию - применяются ко всем комбинациям
# (переопределяются осями в grid_axes)
# ===============================================================================
grid_defaults:
  embedding_model: "BAAI/bge-m3"
  embed_strategy:  text_only
  embed_chars:     300
  merge_window:    1
  max_chunk_chars: 0
  top_k:           7
  hyde:            true
  llm_model:       "gemma3:4b"
  prompt_template: standard
  ragas:
    # judge_model не указывается - автоматически равен llm_model эксперимента
    metrics:     [relevancy]


# ===============================================================================
# Оси перебора - декартово произведение всех списков
# Комбинаций = произведение длин всех списков.
# Имена генерируются автоматически:
#   g__to__k7__m1       (text_only, top_k=7, merge=1)
#   g__ho__k5__m2__hyde (heading_only, top_k=5, merge=2, hyde=true)
# ===============================================================================
grid_axes:

  # heading_only      - только заголовок чанка
  # text_only         - только текст чанка
  # heading_plus_text - заголовок + первые embed_chars символов текста
  embed_strategy: [heading_only, text_only, heading_plus_text]

  top_k: [7, 10, 15, 20]

  # 1 = без слияния; 2 = склеить по 2 соседних чанка; 3 = по 3
  merge_window: [1, 2, 3]

  # Включи [false, true] чтобы протестировать HyDE (+~90s на комбинацию)
  hyde: [true]

  # -- Раскомментируй оси по мере необходимости --------------------------------

  # Другая embedding-модель:
  embedding_model:
    - "BAAI/bge-m3"
    - "intfloat/e5-mistral-7b-instruct"
    - "Qwen/Qwen3-Embedding-8B"

  # Символов текста при heading_plus_text:
  embed_chars: [150, 300, 500]

  # Разбивать длинные чанки:
  max_chunk_chars: [0, 500, 1500]

  # Разные LLM для генерации:
  llm_model:
    - "unsloth/gpt-oss-20b-unsloth-bnb-4bit"
    - "unsloth/gemma-4-31B-unsloth-bnb-4bit"
    - "unsloth/medgemma-27b-text-it-unsloth-bnb-4bit"

  # Разные шаблоны промпта:
  prompt_template: [standard, step_by_step, self_critique, aspect_decomposition]

  # Разные наборы RAGAS-метрик:
  ragas:
    - { metrics: [relevancy, faithfulness, precision, recall] }

  # OCR-ось — это ИСТОЧНИК ДАННЫХ, не гиперпараметр embedding/retrieval.
  # Требует отдельной ингестии (1_ingest.py) для каждого варианта.
  # Раскомментируй когда будешь сравнивать датасеты:
  # chunks_dir:
  #   - "data/chunks"
  #   - "data/chunks_gocr_off"
  #   - "data/chunks_no_gaiv"
